name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17 for Android SDK installation
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Install Android SDK Command Tools
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -P /tmp/
        unzip -q /tmp/commandlinetools-linux-10406996_latest.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

    - name: Install Android SDK Platform 28
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager "platforms;android-28" --sdk_root=$ANDROID_HOME

    - name: Install Android Build Tools 28.0.3
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager "build-tools;28.0.3" --sdk_root=$ANDROID_HOME

    - name: Install Gradle 5.6.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-5.6.4-bin.zip -P /tmp/
        unzip -q /tmp/gradle-5.6.4-bin.zip -d /opt/
        ln -s /opt/gradle-5.6.4/bin/gradle /usr/local/bin/gradle

    - name: Set up JDK 8 for Gradle 5.6.4
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Build Release APK
      run: gradle assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned.apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
